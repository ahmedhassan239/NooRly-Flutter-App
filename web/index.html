<!DOCTYPE html><html><head>
  <!--
    IMPORTANT FOR FLUTTER WEB ROUTING:
    
    This app uses PathUrlStrategy (clean URLs without #).
    For direct URL access to work in production, your web server MUST
    redirect all routes to index.html (SPA fallback).
    
    See README.md for Nginx/Apache/Firebase hosting configurations.
    
    For local development, `flutter run -d chrome` handles this automatically.
    
    If deploying to a subpath (e.g., /app/), update base href and build with:
    flutter build web --base-href /app/
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Noor Journey - Your spiritual guidance companion">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NooRly">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme color for browser chrome (NOORly primary) -->
  <meta name="theme-color" content="#1E40AF">

  <!-- Favicon (source: logo.png — same artwork as app branding) -->
  <link rel="icon" type="image/png" href="logo.png">

  <title>NooRly</title>
  <link rel="manifest" href="manifest.json">

  
  
  
  
  
  
  
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #F5F7FA;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  
  
  <!-- Branded splash (flutter_native_splash) — no spinner; removed when Flutter paints first frame -->
  

  <script>
    window.addEventListener('flutter-first-frame', function () {
      removeSplashFromWeb();
    });
  </script>

  <script src="flutter_bootstrap.js" async=""></script>


</body></html>
