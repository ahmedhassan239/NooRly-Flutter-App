<!DOCTYPE html>
<html>
<head>
  <!--
    IMPORTANT FOR FLUTTER WEB ROUTING:
    
    This app uses PathUrlStrategy (clean URLs without #).
    For direct URL access to work in production, your web server MUST
    redirect all routes to index.html (SPA fallback).
    
    See README.md for Nginx/Apache/Firebase hosting configurations.
    
    For local development, `flutter run -d chrome` handles this automatically.
    
    If deploying to a subpath (e.g., /app/), update base href and build with:
    flutter build web --base-href /app/
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Noor Journey - Your spiritual guidance companion">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NooRly">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme color for browser chrome -->
  <meta name="theme-color" content="#1E40AF">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NooRly</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Loading indicator styles */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #F5F7FA;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #E5E7EB;
      border-top-color: #1E40AF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading indicator while Flutter initializes -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
  </div>

  <script>
    // Remove loading indicator when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.remove();
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
