org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Prevent R8 from stripping generic signatures required by Gson TypeToken (e.g. in
# flutter_local_notifications loadScheduledNotifications / pendingNotificationRequests).
# Without this, release builds can throw: "TypeToken must be created with a type argument".
android.enableR8.fullMode=false
