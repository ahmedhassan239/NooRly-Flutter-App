# Nginx configuration for Flutter Web with PathUrlStrategy
# 
# This configuration enables clean URLs (without #) for Flutter Web apps.
# All routes are redirected to index.html so Flutter's router can handle them.
#
# Usage:
# 1. Copy this to your nginx sites-available directory
# 2. Update server_name and root path
# 3. Enable with: ln -s /etc/nginx/sites-available/noor-journey /etc/nginx/sites-enabled/
# 4. Test with: nginx -t
# 5. Reload with: sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Root directory where Flutter web build is deployed
    root /var/www/noor-journey/build/web;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache HTML and service worker
    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # CRITICAL: SPA fallback - redirect all routes to index.html
    # This allows Flutter's go_router to handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

