<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none">
  <!-- Flock of birds flying in an arc formation -->
  <!-- Each bird is a simple V shape (wings) -->
  
  <!-- Bird 1 (leftmost, lower) -->
  <path d="M 10 50 L 15 45 L 20 50" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Bird 2 -->
  <path d="M 25 45 L 30 40 L 35 45" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Bird 3 (center, highest) -->
  <path d="M 45 35 L 50 30 L 55 35" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Bird 4 -->
  <path d="M 65 40 L 70 35 L 75 40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Bird 5 -->
  <path d="M 80 45 L 85 40 L 90 45" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Bird 6 (rightmost, lower) -->
  <path d="M 95 50 L 100 45 L 105 50" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
